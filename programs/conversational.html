<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Konuşma Özgüveni & Akıcılık — Cozy English</title>
<link rel="icon" href="../cozy-favicon.png.png" type="image/png"/>
<link rel="stylesheet" href="../css/style.css"/>
<style>
.prog-hero{background:var(--primary);padding:5rem 2rem 4.5rem;position:relative;overflow:hidden;}
.prog-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 70%,rgba(241,174,98,0.18) 0%,transparent 60%);}
.prog-hero-inner{max-width:860px;margin:0 auto;position:relative;z-index:1;}
.prog-back{display:inline-flex;align-items:center;gap:8px;font-size:0.8125rem;color:rgba(255,255,255,0.5);text-decoration:none;margin-bottom:2rem;transition:color 0.2s;}
.prog-back:hover{color:rgba(255,255,255,0.9);}
.prog-tag{display:inline-block;background:rgba(241,174,98,0.2);color:var(--amber-light);font-size:0.6875rem;font-weight:500;letter-spacing:0.12em;text-transform-uppercase;padding:4px 12px;border-radius:20px;margin-bottom:1.25rem;}
.prog-hero h1{font-family:'Cormorant Garamond',serif;font-size:clamp(2.25rem,4vw,3.25rem);font-weight:600;color:#fff;line-height:1.12;margin-bottom:1rem;}
.prog-hero p{font-size:1.0625rem;color:rgba(255,255,255,0.6);max-width:600px;line-height:1.8;}
.prog-hero-stats{display:flex;gap:2.5rem;margin-top:2.5rem;flex-wrap:wrap;}
.prog-stat-num{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:600;color:var(--amber-light);line-height:1;}
.prog-stat-label{font-size:0.75rem;color:rgba(255,255,255,0.45);margin-top:3px;}
.content-section{padding:5rem 0;background:var(--white);}
.content-section.alt{background:var(--pearl);}
.content-inner{max-width:860px;margin:0 auto;padding:0 2rem;}
.content-inner h2{font-family:'Cormorant Garamond',serif;font-size:clamp(1.75rem,3vw,2.375rem);font-weight:600;color:var(--ink);line-height:1.2;margin-bottom:1.5rem;}
.content-inner p{font-size:1rem;line-height:1.9;color:var(--ink-light);margin-bottom:1.25rem;}
.content-inner strong{color:var(--ink);font-weight:500;}
.blocker-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1rem;margin:2rem 0;}
.blocker-card{border:1px solid var(--border);border-radius:12px;padding:1.5rem;}
.blocker-card h4{font-size:0.9375rem;font-weight:500;color:var(--ink);margin-bottom:0.4rem;display:flex;align-items:center;gap:8px;}
.blocker-card p{font-size:0.85rem;line-height:1.7;color:var(--ink-light);margin:0;}
.scenario-list{list-style:none;margin:1.5rem 0;}
.scenario-list li{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);font-size:0.9375rem;color:var(--ink-light);line-height:1.7;}
.scenario-list li:last-child{border-bottom:none;}
.scenario-list li::before{content:'→';color:var(--amber);flex-shrink:0;font-weight:500;margin-top:2px;}
.callout{background:var(--primary);border-radius:14px;padding:2.5rem 3rem;text-align:center;margin:3rem 0;}
.callout h3{font-family:'Cormorant Garamond',serif;font-size:1.625rem;font-weight:600;font-style:italic;color:#fff;margin-bottom:0.75rem;}
.callout p{color:rgba(255,255,255,0.6);font-size:0.9375rem;line-height:1.7;margin-bottom:1.5rem;}
@media(max-width:700px){.blocker-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>
